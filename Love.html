<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8/3 đặc biệt cho Hamy 💖</title>

<style>
body {
    margin: 0;
    padding: 0;
    overflow: auto;
    background: linear-gradient(135deg, #ffd6e7, #ffeaf4);
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
}
.container {
    position: relative;
    z-index: 2;
    margin-top: 120px;
}

h1 {
    color: #ff4f81;
    font-size: 45px;
}

p {
    font-size: 20px;
    width: 70%;
    margin: auto;
    color: #444;
}

button:hover {
    background: #ff2e6a;
    transform: scale(1.1);
}

.heart {
    position: fixed;
    top: -10px;
    color: #ff4f81;
    font-size: 20px;
    animation: fall 3s linear infinite;
    z-index: 1;
}

audio {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
}

#extraMessage {
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.8s ease;
  margin-top: 20px;
  font-weight: bold;
  color: #ff4f81;
}

#extraMessage.show {
  opacity: 1;
  transform: translateY(0);
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Chúc mừng 8/3 🌸</h1>
    <p style="margin-top:20px;">
        Chúc Hamy luôn xinh đẹp, vui vẻ và được yêu thương thật nhiều.
        Cảm ơn vì đã xuất hiện và làm cuộc sống của tui dịu dàng hơn mỗi ngày 💖
    </p>

    <p id="extraMessage"></p>

    <button onclick="specialMessage()">Bấm vào đây nè</button>
</div>

<audio id="music" loop>
  <source src="coem.mp3" type="audio/mpeg">
</audio>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);
function specialMessage() {
  const music = document.getElementById("music");
  music.play();

  const extra = document.getElementById("extraMessage");

  extra.innerHTML +=
    "<br><br>Tui hy vọng một ngày nào đó được là người tặng quà 8/3 cho Hamy mỗi năm 🥰";

  extra.classList.add("show");

  document.querySelector("button").style.display = "none";
}
</script>

</body>
</html>
